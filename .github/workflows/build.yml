name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ltbrfm-android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Debug-signed APK is directly sideloadable for Android Auto developer
      # mode. Play Store distribution needs a release keystore + signing config.
      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp app/build/outputs/apk/debug/app-debug.apk "ltbrfm-${{ github.ref_name }}.apk"

      - name: Create release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ltbrfm-v*.apk
          draft: false
          body: |
            ### LTBR·FM for Android & Android Auto

            Direct-download APK — no store needed.

            **Install**: copy to your phone and open it, or `adb install -r ltbrfm-*.apk`.
            Because this build is debug-signed, if an install from a *different* CI run is
            already present you may need to uninstall it first (signature mismatch).

            **Android Auto**: enable developer mode in the Android Auto app
            (Settings → tap *Version* repeatedly), then Developer settings →
            **Unknown sources** ON. LTBR·FM then appears in the car's media launcher
            with live now-playing titles.
